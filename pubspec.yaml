name: reellab
description: ReelLab — sandbox d'interface reel pour Watchtower. Itérer l'UI ici, intégrer dans Watchtower quand satisfait.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # video_player — Flutter team, v2 embedding garanti, remplacé par media_kit à l'intégration Watchtower
  video_player: ^2.9.2
  cached_network_image: ^3.3.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

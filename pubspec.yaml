name: tiktok_flutter
description: Reel — TikTok-style feed powered by Watchtower server.

publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  video_player: ^2.8.6
  get_it: ^7.6.7
  stacked: ^3.4.3
  cached_network_image: ^3.3.1
  http: ^1.2.1
  shared_preferences: ^2.3.0
  watchtower_client:
    git:
      url: https://github.com/ferelking242/watchtower-sdk-dart.git
      ref: main

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: TikTokIcons
      fonts:
        - asset: assets/fonts/TikTokIcons.ttf
